<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apps</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #0a0a0a;
  color: #e4e4e7;
  min-height: 100vh;
  padding: 60px 20px;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
}

.title {
  font-size: 3rem;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 50px;
  letter-spacing: -1px;
  text-align: center;
}

.apps-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

.app-card {
  background: #0f0f0f;
  border: 1px solid #1f1f1f;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: border 0.15s ease, transform 0.15s ease;
}

.app-card:hover {
  border-color: #2a2a2a;
  transform: translateY(-3px);
}

.app-card img {
  width: 64px;
  height: 64px;
  object-fit: contain;
  margin-bottom: 15px;
  border-radius: 12px;
}

.app-card h3 {
  font-size: 15px;
  font-weight: 500;
  color: #ffffff;
}

.loader {
  position: fixed;
  inset: 0;
  background: #0a0a0a;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.loader.show {
  display: flex;
}

.spinner {
  width: 28px;
  height: 28px;
  border: 2px solid #1f1f1f;
  border-top-color: #ffffff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Fullscreen app iframe */
#appFrame {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
  background: #0a0a0a;
  z-index: 200;
}

/* Close button */
#closeBtn {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 300;
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: none;
  font-size: 24px;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  cursor: pointer;
  display: none;
  transition: background 0.2s ease;
}

#closeBtn:hover {
  background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<iframe id="appFrame"></iframe>
<button id="closeBtn"><i class="fa fa-times"></i></button>

<div class="container">
  <h1 class="title">Apps</h1>
  <div class="apps-grid" id="appsGrid"></div>
</div>

<script>
const apps = [
  { name: "Turbowarp", icon: "https://cdn.jsdelivr.net/gh/HyperFloppik/Ethyrnal-s-Arcade-v2.3@main/icons/turbowarp.png" },
  { name: "Soundboard", icon: "https://cdn.jsdelivr.net/gh/HyperFloppik/Ethyrnal-s-Arcade-v2.3@main/icons/soundboard.png" },
  { name: "Silk", icon: "https://cdn.jsdelivr.net/gh/HyperFloppik/Ethyrnal-s-Arcade-v2.3@main/icons/silk.png" },
  { name: "Ruffle", icon: "https://cdn.jsdelivr.net/gh/HyperFloppik/Ethyrnal-s-Arcade-v2.3@main/icons/ruffle.png" },
  { name: "Pico 8 Education", icon: "https://cdn.jsdelivr.net/gh/HyperFloppik/Ethyrnal-s-Arcade-v2.3@main/icons/pico8edu.jpg" },
  { name: "Github Client", icon: "https://cdn.jsdelivr.net/gh/HyperFloppik/Ethyrnal-s-Arcade-v2.3@main/icons/githubclient.png" },
  { name: "Emulator JS", icon: "https://cdn.jsdelivr.net/gh/HyperFloppik/Ethyrnal-s-Arcade-v2.3@main/icons/emulatorjs.png" },
  { name: "Dos Wasm X", icon: "https://cdn.jsdelivr.net/gh/HyperFloppik/Ethyrnal-s-Arcade-v2.3@main/icons/doswasmx.png" },
  { name: "Dont You Lecture Me With Your Thirty Dollar Haircut", icon: "https://cdn.jsdelivr.net/gh/HyperFloppik/Ethyrnal-s-Arcade-v2.3@main/icons/DontYouLectureMeWithYourThirtyDollarHaircut.png" }
];

const grid = document.getElementById("appsGrid");
const loader = document.getElementById("loader");
const iframe = document.getElementById("appFrame");
const closeBtn = document.getElementById("closeBtn");

apps.forEach(app => {
  const card = document.createElement("div");
  card.className = "app-card";

  card.innerHTML = `
    <img src="${app.icon}" alt="${app.name}">
    <h3>${app.name}</h3>
  `;

  card.onclick = async () => {
    loader.classList.add("show");

    try {
      const fileName = app.icon.split('/').pop().replace(/\.[^/.]+$/, "");
      const url = `https://cdn.jsdelivr.net/gh/HyperFloppik/ethyrnal-s-Arcade-v2.3@main/apps/${fileName}.html`;

      const response = await fetch(url);
      if (!response.ok) throw new Error("Network error");
      const html = await response.text();

      iframe.srcdoc = html;
      iframe.style.display = "block";
      closeBtn.style.display = "block";

    } catch (err) {
      alert("Failed to load app.");
      console.error(err);
    } finally {
      loader.classList.remove("show");
    }
  };

  grid.appendChild(card);
});

// Close button functionality
closeBtn.onclick = () => {
  iframe.style.display = "none";
  iframe.srcdoc = "";
  closeBtn.style.display = "none";
};
</script>

</body>
</html>
