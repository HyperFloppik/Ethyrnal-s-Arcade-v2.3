<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethyrnal Arcade</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: system-ui, sans-serif;
  background: #0a0a0a;
  color: #e4e4e7;
}

/* ===== TOP BAR ===== */
#gameTopBar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  background: rgba(15,15,15,0.9);
  border-bottom: 1px solid #1f1f1f;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 1000;
}

#arcadeTitle {
  font-size: 18px;
  font-weight: 600;
}

#topControls {
  display: flex;
  gap: 10px;
}

#searchBox {
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid #1f1f1f;
  background: #111;
  color: white;
}

/* ===== BUTTON GRID ===== */
#buttons {
  padding: 100px 20px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
  max-width: 1100px;
  margin: auto;
}

#buttons button {
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #1f1f1f;
  background: #111;
  color: white;
  cursor: pointer;
}

#buttons button:hover {
  background: #1a1a1a;
}
</style>
</head>

<body>

<div id="gameTopBar">
  <div id="arcadeTitle">Ethyrnal Arcade</div>
  <div id="topControls">
    <input id="searchBox" placeholder="Search your favorite game...">
  </div>
</div>

<div id="buttons">Loading…</div>

<script>
const listURL = "https://cdn.jsdelivr.net/gh/HyperFloppik/Ethyrnal-Arcade@master/GameList.txt";
const base = "https://cdn.jsdelivr.net/gh/HyperFloppik/Ethyrnal-Arcade@master/";

let lines = [];
let lastRendered = [];

const searchBox = document.getElementById("searchBox");
const buttonsEl = document.getElementById("buttons");

// Fetch the game list
fetch(listURL)
  .then(r => r.text())
  .then(text => {
    lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    renderButtons(lines);
  })
  .catch(err => {
    buttonsEl.textContent = "Error loading game list";
    console.error(err);
  });

// Clean display name
function cleanName(name) {
  return name.replace(".html","").replace(/^cl/i,"").trim();
}

// Render buttons
function renderButtons(list) {
  if (JSON.stringify(list) === JSON.stringify(lastRendered)) return;
  lastRendered = [...list];

  buttonsEl.innerHTML = "";
  list.forEach(filename => {
    const btn = document.createElement("button");
    btn.textContent = cleanName(filename);
    btn.onclick = () => openGame(filename);
    buttonsEl.appendChild(btn);
  });
}

// Open game
async function openGame(filename) {
  filename = filename.trim();
  if (!filename.toLowerCase().endsWith(".html")) filename += ".html";

  const paths = [
    "activities/" + filename,
    "activities2/" + filename,
    filename
  ];

  for (const path of paths) {
    const url = base + path;
    try {
      const response = await fetch(url);
      if (response.ok) {
        const html = await response.text(); // fetch jsdelivr
        launchGame(html); // share code with src doc
        return;
      }
    } catch {}
  }
  alert("Game not found: " + filename);
}

// launch game via srcdoc
function launchGame(htmlContent) {
  document.getElementById("gameTopBar").style.display = "none";
  document.getElementById("buttons").style.display = "none";

  const iframe = document.createElement("iframe");
  iframe.srcdoc = htmlContent; // inject html
  iframe.style.position = "fixed";
  iframe.style.inset = "0";
  iframe.style.width = "100%";
  iframe.style.height = "100%";
  iframe.style.border = "none";
  iframe.style.zIndex = "9999";

  document.body.appendChild(iframe);
}

// search
searchBox.addEventListener("input", () => {
  const q = searchBox.value.toLowerCase();
  renderButtons(lines.filter(l => l.toLowerCase().includes(q)));
});
</script>

</body>
</html>
