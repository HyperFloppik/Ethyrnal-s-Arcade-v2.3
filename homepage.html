<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ethyrnal's Arcade</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #0a0a0a;
  color: #e4e4e7;
  min-height: 100vh;
  padding: 40px 20px;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  position: relative;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: -1;
}

.container {
  width: 100%;
  max-width: 900px;
  margin: auto;
  text-align: center;
  position: relative;
  z-index: 1;
}

.title {
  font-size: 3rem;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 30px;
  letter-spacing: -1px;
}

/* Search bar */
.search-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #0f0f0f;
  border: 1px solid #1f1f1f;
  border-radius: 12px;
  padding: 8px 12px;
  width: 100%;
  max-width: 500px;
  margin: 0 auto 25px auto;
}

.search-box i {
  color: #71717a;
  font-size: 24px;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.search-box input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #ffffff;
  font-size: 14px;
  padding: 6px 10px;
}

/* Fullscreen overlay */
#gameOverlay {
  position: fixed;
  inset: 0;
  background: #000;
  display: none;
  z-index: 9999;
}

#gameOverlay.show { display: flex; }

#gameFrame {
  flex: 1;
  border: none;
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>
<div class="container">
  <h1 class="title">Ethyrnal's Arcade</h1>

  <!-- Proxy search bar -->
  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
    <input type="text" id="searchInput" placeholder="Search the web..." autocomplete="off">
  </div>
</div>

<!-- Fullscreen overlay -->
<div id="gameOverlay">
  <iframe id="gameFrame"></iframe>
</div>

<script>
const frame = document.getElementById("gameFrame");
const overlay = document.getElementById("gameOverlay");
const searchInput = document.getElementById("searchInput");
const searchIcon = document.getElementById("searchIcon");

// Search overlay /scramjet/index.html#<url>
function performSearch() {
  let query = searchInput.value.trim();
  if (!query) return;

  // Detect if URL
  if (!/^https?:\/\//i.test(query)) {
    query = "https://www.google.com/search?q=" + encodeURIComponent(query);
  }

  const url = "/scramjet/index.html#" + encodeURIComponent(query);
  frame.src = url;
  overlay.classList.add("show");
  document.body.style.overflow = "hidden";
}

searchInput.addEventListener("keypress", e => {
  if (e.key === "Enter") {
    performSearch();
    e.preventDefault();
  }
});

searchIcon.addEventListener("click", performSearch);
</script>
</body>
</html>
